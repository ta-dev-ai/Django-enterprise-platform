{% load static %}
<link rel="stylesheet" href="{% static 'components/navbar/navbar.css' %}" />
<header class="home-header">
  <div class="home-header-container">
    <nav class="home-nav">
      <a href="{% url 'home' %}" class="home-brand">
        <div class="contact-logo">
          <span class="material-symbols-outlined">energy_savings_leaf</span>
        </div>
        <h2 class="contact-brand-title">RenovateEnergy</h2>
      </a>
      <div class="home-nav-links">
        <a class="home-nav-link" href="{% url 'home' %}">Accueil</a>
        <a class="home-nav-link" href="{% url 'about' %}">À propos</a>
        <a class="home-nav-link" href="{% url 'contact' %}">Contact</a>
        {% if user.is_authenticated %}
        <a class="home-nav-link" href="{% url 'dashboard' %}">Dashboard</a>
        {% endif %}
      </div>
      <div class="home-nav-actions">
        {% if user.is_authenticated %}
        <a href="{% url 'logout' %}" class="home-btn home-btn-secondary">Déconnexion</a>
        {% else %}
        <a href="{% url 'login' %}" class="home-btn home-btn-secondary">Connexion</a>
        <a href="{% url 'login' %}" class="home-btn home-btn-primary">Inscription</a>
        {% endif %}
      </div>
    </nav>
  </div>
</header>
