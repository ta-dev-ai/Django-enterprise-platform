<div class="overflow-x-auto rounded-lg border border-slate-200 shadow-sm">
    <table class="w-full text-sm text-left text-slate-500" id="{{ table_id }}">
        <thead class="text-xs text-slate-700 uppercase bg-slate-50">
            <tr>
                <!-- Headers injected via JS or Django Context -->
                {% for col in columns %}
                <th scope="col" class="px-6 py-3 font-bold">{{ col }}</th>
                {% endfor %}
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-slate-200">
            <!-- Rows injected via JS -->
        </tbody>
    </table>
</div>

<div id="{{ table_id }}-pagination" class="flex items-center justify-between mt-4 px-4">
    <!-- Pagination controls -->
</div>
