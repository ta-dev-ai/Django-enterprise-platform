{% load static %}
<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>TEST COMPONENT CSS - Dashboard</title>

    <!-- 1. STABILIZED LEGACY FOUNDATIONS (Layout & Base) -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}" />
    <link rel="stylesheet" href="{% static 'css/theme-midnight.css' %}" /> 
    
    <!-- 2. NEW MODULAR COMPONENTS (Overrides for specific parts) -->
    <link rel="stylesheet" href="{% static 'css/components_test/variables.css' %}" />
    <!-- base.css removed to avoid conflict with style.css on body/h1 -->
    
    <!-- 2. Components -->
    <link rel="stylesheet" href="{% static 'css/components_test/header.css' %}" />
    <link rel="stylesheet" href="{% static 'css/components_test/sidebar.css' %}" />
    <link rel="stylesheet" href="{% static 'css/components_test/cards.css' %}" />
    <link rel="stylesheet" href="{% static 'css/components_test/buttons.css' %}" />
    <link rel="stylesheet" href="{% static 'css/components_test/forms.css' %}" />
    
    <link href="{% static 'css/font.css' %}" rel="stylesheet" />
    <script src="{% static 'js/cdn/cdn.tailwindcss.js' %}"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    {% block extra_css %}{% endblock %}
  </head>
  <body class="bg-slate-50" data-page="{% block page_name %}dashboard{% endblock %}">
    
    <!-- Sidebar -->
    {% include 'components/sidebar/sidebar.html' %}

    <!-- Main Content -->
    {% block content %}{% endblock %}

    <!-- Scripts -->
    <script src="{% static 'js/theme.js' %}"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
