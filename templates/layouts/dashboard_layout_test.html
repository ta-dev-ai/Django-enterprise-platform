{% load static %}
<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>TEST COMPONENT CSS - Dashboard</title>

    <!-- Global CSS (Base) -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <!-- On désactive temporairement dashboard.css et theme-midnight pour voir si sidebar.css suffit pour la sidebar 
         Mais on en a besoin pour le reste du layout... Dilemme du test partiel.
         On les garde pour le contexte, mais le but est de migrer petit à petit.
    -->
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}" />
    <link rel="stylesheet" href="{% static 'css/theme-midnight.css' %}" />
    
    <!-- *** NEW COMPONENT CSS (MUST WIN) *** -->
    <link rel="stylesheet" href="{% static 'css/components_test/sidebar.css' %}" style="border: 2px solid red;" />
    
    <link href="{% static 'css/font.css' %}" rel="stylesheet" />
    <script src="{% static 'js/cdn/cdn.tailwindcss.js' %}"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    {% block extra_css %}{% endblock %}
  </head>
  <body class="bg-slate-50" data-page="{% block page_name %}dashboard{% endblock %}">
    
    <!-- Sidebar -->
    {% include 'components/sidebar/sidebar.html' %}

    <!-- Main Content -->
    {% block content %}{% endblock %}

    <!-- Scripts -->
    <script src="{% static 'js/theme.js' %}"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
