<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Page non trouvée - RenovateEnergy</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&family=Inter:wght@400&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/404.css" />
</head>

<body class="error-body">
    <header class="error-header">
        <div class="error-header-container">
            <nav class="error-nav">
                <a class="error-brand" href="home.html">
                    <span class="material-symbols-outlined error-logo-icon">energy_savings_leaf</span>
                    <span class="error-brand-text">RenovateEnergy</span>
                </a>
                <div class="error-nav-links">
                    <a class="error-nav-link" href="home.html">Accueil</a>
                    <a class="error-nav-link" href="about.html">À propos</a>
                    <a class="error-nav-link" href="contact.html">Contact</a>
                </div>
                <div class="error-nav-actions">
                    <a href="login.html" class="error-btn-secondary">Connexion</a>
                    <a href="login.html" class="error-btn-primary">Inscription</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="error-main">
        <div class="error-content">
            <div class="error-icon-wrapper">
                <span class="material-symbols-outlined error-icon">error</span>
            </div>
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Page non trouvée</h2>
            <p class="error-description">
                Désolé, la page que vous recherchez n'existe pas ou a été déplacée.
            </p>
            <div class="error-actions">
                <a href="home.html" class="error-action-btn error-action-primary">
                    <span class="material-symbols-outlined">home</span>
                    <span>Retour à l'accueil</span>
                </a>
                <button onclick="window.history.back()" class="error-action-btn error-action-secondary">
                    <span class="material-symbols-outlined">arrow_back</span>
                    <span>Page précédente</span>
                </button>
            </div>
        </div>
    </main>
</body>

</html>
