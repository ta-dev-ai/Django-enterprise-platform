<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>RenovateEnergy Launcher</title>
    <!-- QWebChannel local -->
    <script src="qwebchannel.js"></script>
    <style>
        /* --- THEME MIDNIGHT GLASS --- */
        :root {
            --bg-body: radial-gradient(circle at 50% 0%, #1e3a8a 0%, #020617 100%);
            --text-main: #f8fafc;
            --primary: #38bdf8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        .container {
            text-align: center;
            background: rgba(30, 41, 59, 0.4);
            padding: 3rem 4rem;
            border-radius: 2rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #00f2ff 0%, #2b6cee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        p {
            color: #cbd5e1;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .btn-launch {
            background: linear-gradient(135deg, #00f2ff 0%, #2b6cee 100%);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 9999px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-launch:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.6);
        }

        .loader {
            display: none; /* Caché par défaut */
            border: 4px solid rgba(56, 189, 248, 0.1);
            border-left: 4px solid #00f2ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 1.5rem auto 0 auto;
        }
        
        .status-text {
            display: none;
            margin-top: 10px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div style="font-size: 4rem; margin-bottom: 1rem;">🌿</div>
        
        <h1>RenovateEnergy</h1>
        <p>Governance OS & Data Visualization</p>

        <button class="btn-launch" id="btnLaunch">LANCER LE PROJET</button>
        
        <div class="loader" id="loader"></div>
        <div class="status-text" id="statusText">Démarrage du serveur...</div>
    </div>

    <script>
        document.getElementById('btnLaunch').addEventListener('click', function() {
            // UI Update
            this.style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('statusText').style.display = 'block';

            // Trigger Python by "Navigation"
            window.location.href = "http://launch-now/";
        });
    </script>
</body>
</html>
