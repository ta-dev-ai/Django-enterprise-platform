{% extends "layouts/dashboard_layout.html" %}
{% load static %}
{% block title %}Dataset Explorer — Data Intelligence{% endblock %}
{% block page_name %}dataset-explorer{% endblock %}

{% block content %}
<main class="dashboard-main p-6 grid grid-cols-12 gap-6">
  <aside class="col-span-3 glass-card p-4" id="sidebar-panel">
    <h2 class="text-lg font-medium mb-3">Filtres</h2>
    <div id="sidebar-filters"></div>
    <button id="reset-filters" class="mt-4 text-sm">Effacer filtres</button>
    <p id="row-indicator" class="mt-3 text-sm opacity-80"></p>
  </aside>

  <section class="col-span-6 glass-card p-4">
    <h2 class="text-lg font-medium mb-3">Visualisation</h2>
    <div id="chart-container" style="min-height: 320px"></div>
    <div id="table-container" class="mt-4 overflow-auto"></div>
  </section>

  <aside class="col-span-3 glass-card p-4" id="chat-drawer">
    <h2 class="text-lg font-medium mb-3">Chat Analyst</h2>
    <div id="chat-chips" class="flex flex-wrap gap-2 mb-3"></div>
    <div id="chat-messages" class="text-sm space-y-2 mb-3" style="max-height: 240px; overflow-y: auto"></div>
    <form id="chat-form" class="flex gap-2">
      <input id="chat-input" class="flex-1" placeholder="Posez une question..." />
      <button type="submit">Envoyer</button>
    </form>
  </aside>
</main>
{% endblock %}

{% block extra_js %}
<script>
  window.DATASET_ID = "{{ dataset_id }}";
</script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script type="module" src="{% static 'js/dataset/SidebarController.js' %}"></script>
<script type="module" src="{% static 'js/dataset/ChartController.js' %}"></script>
<script type="module" src="{% static 'js/dataset/ChatPanel.js' %}"></script>
{% endblock %}
