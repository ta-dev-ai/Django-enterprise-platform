<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>RenovateEnergy Launcher</title>
    <style>
      /* --- THEME MIDNIGHT GLASS --- */
      :root {
        --bg-body: radial-gradient(circle at 50% 0%, #1e3a8a 0%, #020617 100%);
        --text-main: #f8fafc;
        --primary: #38bdf8;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
        background: var(--bg-body);
        color: var(--text-main);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        user-select: none;
      }

      .container {
        text-align: center;
        background: rgba(30, 41, 59, 0.4);
        padding: 3rem 4rem;
        border-radius: 2rem;
        border: 1px solid rgba(56, 189, 248, 0.2);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        animation: fadeIn 1s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #00f2ff 0%, #2b6cee 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
      }

      p {
        color: #cbd5e1;
        font-size: 1.1rem;
        margin-bottom: 2rem;
      }

      /* Spinner Loader */
      .loader {
        border: 4px solid rgba(56, 189, 248, 0.1);
        border-left: 4px solid #00f2ff;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 1.5rem auto;
        box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .status {
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.6);
        letter-spacing: 1px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div style="font-size: 4rem; margin-bottom: 1rem">🌿</div>

      <h1>RenovateEnergy</h1>
      <p>Governance OS & Data Visualization</p>

      <div class="loader"></div>

      <div class="status">Démarrage du Serveur Local...</div>
      <div style="margin-top: 10px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.3)">
        Veuillez patienter quelques secondes
      </div>
    </div>
  </body>
</html>
