{% load static %}
<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{% block title %}Dashboard - RenovateEnergy{% endblock %}</title>

    <!-- Global CSS (LEGACY STABLE FOUNDATION) -->
    <!-- 1. BASE -->
    <link rel="stylesheet" href="{% static 'css/base/variables.css' %}" />
    <link rel="stylesheet" href="{% static 'css/base/base.css' %}" />
    <link rel="stylesheet" href="{% static 'css/base/typography.css' %}" />
    <link rel="stylesheet" href="{% static 'css/base/theme.css' %}" />

    <!-- 2. COMPONENTS -->
    <link rel="stylesheet" href="{% static 'css/components/header.css' %}" />
    <link rel="stylesheet" href="{% static 'css/components/sidebar.css' %}" />
    <link rel="stylesheet" href="{% static 'css/components/cards.css' %}" />
    <link rel="stylesheet" href="{% static 'css/components/buttons.css' %}" />
    <link rel="stylesheet" href="{% static 'css/components/forms.css' %}" />

    <!-- 3. PAGE SPECIFIC -->
    <!-- Usually handled by 'block extra_css', but importing dashboard.css here for default layout support -->
    <link rel="stylesheet" href="{% static 'css/pages/dashboard.css' %}" />

    <!-- Tailwind (Local) -->
    <script src="{% static 'js/cdn/cdn.tailwindcss.js' %}"></script>

    <!-- Material Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />

    {% block extra_css %}{% endblock %}
  </head>
  <body class="bg-slate-50" data-page="{% block page_name %}dashboard{% endblock %}">
    <!-- Sidebar Component (Using the one we migrated from batimentRenovation) -->
    {% include 'components/sidebar/sidebar.html' %}

    <!-- Main Content Area -->
    {% block content %}{% endblock %}

    <!-- Global Scripts -->
    <script src="{% static 'js/theme.js' %}"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
