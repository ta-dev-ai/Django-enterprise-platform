{% load static %}
<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{% block title %}Dashboard - RenovateEnergy{% endblock %}</title>

    <!-- Global CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}" />
    <!-- Dark Mode Theme (Overrides) -->
    <link rel="stylesheet" href="{% static 'css/theme-midnight.css' %}" />
    <link href="{% static 'css/font.css' %}" rel="stylesheet" />

    <!-- Tailwind (Local) -->
    <script src="{% static 'js/cdn/cdn.tailwindcss.js' %}"></script>

    <!-- Material Icons -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />

    {% block extra_css %}{% endblock %}
  </head>
  <body class="bg-slate-50" data-page="{% block page_name %}dashboard{% endblock %}">
    <!-- Sidebar Component (Using the one we migrated from batimentRenovation) -->
    {% include 'components/sidebar/sidebar.html' %}

    <!-- Main Content Area -->
    {% block content %}{% endblock %}

    <!-- Global Scripts -->
    <script src="{% static 'js/theme.js' %}"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
