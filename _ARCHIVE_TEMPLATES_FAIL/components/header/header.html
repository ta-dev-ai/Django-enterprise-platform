<header class="contact-header">
	<div class="contact-header-inner">
		<a href="{% url 'home' %}" class="contact-brand">
			<div class="contact-logo">
				<span class="material-symbols-outlined">energy_savings_leaf</span>
			</div>
			<h2 class="contact-brand-title">RenovateEnergy</h2>
		</a>

		<nav class="contact-nav">
			<a href="{% url 'home' %}">Accueil</a>
			<a class="{% block about-active %}{% endblock %}" href="{% url 'about' %}">À propos</a>
			<a class="{% block contact-active %}{% endblock %}" href="{% url 'contact' %}">Contact</a>
			{% if user.is_authenticated %}
				<a href="{% url 'dashboard' %}">Dashboard</a>
			{% endif %}
		</nav>

		<div class="contact-actions">
			{% if user.is_authenticated %}
				<a href="{% url 'logout' %}" class="contact-btn-secondary">Déconnexion</a>
			{% else %}
				<a href="{% url 'login' %}" class="contact-btn-secondary">Connexion</a>
				<a href="{% url 'login' %}" class="contact-btn-primary">Inscription</a>
			{% endif %}
		</div>
	</div>
</header>
